<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Finder Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0824;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  text-align: center;
  padding: 15px;
  background: #1a0a3d;
}

/* Search */
.search-box {
  display: flex;
  padding: 10px;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  border: none;
  background: #6a5af9;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* Results */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.song {
  display: flex;
  gap: 10px;
  background: #1a0a3d;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
}

.song:hover {
  transform: scale(1.02);
}

.song img {
  width: 60px;
  border-radius: 8px;
}

.loading {
  text-align: center;
  opacity: 0.7;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h2>🎧 Music Finder Pro</h2>
</header>

<div class="search-box">
  <input id="searchInput" placeholder="Search any song..." />
  <button onclick="searchSong()">Search</button>
</div>

<div class="content" id="results">
  <p class="loading">Search for music 🎵</p>
</div>

<script>

const API_URL = "https://music-searcher1.onrender.com"; 
// Example: https://music-backend.onrender.com/search?q=

async function searchSong() {
  const q = document.getElementById("searchInput").value.trim();
  const results = document.getElementById("results");

  if (!q) return;

  results.innerHTML = "<p class='loading'>Searching...</p>";

  try {
    const res = await fetch(API_URL + encodeURIComponent(q));
    const data = await res.json();

    if (!data.data || data.data.length === 0) {
      results.innerHTML = "<p class='loading'>No songs found 😢</p>";
      return;
    }

    results.innerHTML = "";

    data.data.forEach(track => {
      const div = document.createElement("div");
      div.className = "song";

      div.innerHTML = `
        <img src="${track.album.cover_medium}">
        <div>
          <b>${track.title}</b><br>
          <small>${track.artist.name}</small>
        </div>
      `;

      div.onclick = () => {
        window.open(track.link, "_blank");
      };

      results.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    results.innerHTML = "<p class='loading'>Server error ⚠️ Check backend</p>";
  }
}

/* Enter key support */
document.getElementById("searchInput").addEventListener("keypress", e => {
  if (e.key === "Enter") searchSong();
});

</script>

</body>
</html>
